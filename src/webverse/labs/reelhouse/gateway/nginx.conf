upstream app_upstream { server app:8000; }
upstream prints_upstream { server prints:8000; }
upstream pantry_upstream { server pantry:8000; }
upstream booth_upstream { server booth:8000; }

server {
    listen 80;
    server_name reelhouse.local;
    location / {
        proxy_pass http://app_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name prints.reelhouse.local;
    location / {
